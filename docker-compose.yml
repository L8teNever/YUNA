services:
  yuna:
    image: ghcr.io/l8tenever/yuna:latest
    # To build locally instead of pulling, comment out 'image' and uncomment:
    # build: .
    ports:
      - "10.7.0.1:1456:8080"
    environment:
      - YUNA_PASSWORD=${YUNA_PASSWORD:-}
      - PORT=8080
    restart: unless-stopped
    networks:
      - yuna_net
    # Uncomment to mount host filesystem into container:
    # volumes:
    #   - /:/host:ro

networks:
  yuna_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
